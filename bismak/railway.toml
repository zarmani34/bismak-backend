[build]
builder = "nixpacks"

[deploy]
startCommand = "/opt/venv/bin/daphne -b 0.0.0.0 -p $PORT bismak.asgi:application"
preDeployCommand = "/opt/venv/bin/python manage.py migrate --noinput && /opt/venv/bin/python manage.py collectstatic --noinput"
healthcheckPath = "/admin/login/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"

[env]
DJANGO_SETTINGS_MODULE = "bismak.settings.prod"